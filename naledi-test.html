<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naledi · test</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧿</text></svg>">
<style>
  :root { --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e; --border: #2a2a2a; --text: #e0e0e0; --text2: #888; --accent: #a78bfa; --accent2: #7c3aed; --green: #34d399; --red: #f87171; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font: 15px/1.5 system-ui, sans-serif; height: 100vh; display: flex; overflow: hidden; }
  #side { width: 340px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); }
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  h1 { font-size: 14px; font-weight: 600; letter-spacing: .5px; padding: 16px; border-bottom: 1px solid var(--border); color: var(--accent); display: flex; align-items: center; gap: 8px; }
  h1 small { color: var(--text2); font-weight: 400; font-size: 11px; }
  #presets { padding: 12px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
  .preset { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer; font-size: 13px; text-align: left; color: var(--text); transition: all .15s; }
  .preset:hover { border-color: var(--accent); background: #1a1a2e; }
  .preset .desc { font-size: 11px; color: var(--text2); margin-top: 2px; }
  #tools { border-top: 1px solid var(--border); flex: 1; overflow-y: auto; min-height: 0; }
  #tools.hidden { display: none; }
  #tools h2 { font-size: 11px; font-weight: 600; letter-spacing: .5px; padding: 10px 12px; color: var(--text2); text-transform: uppercase; }
  .tool-call { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .tool-call .name { color: var(--accent); font-weight: 600; }
  .tool-call .args { color: var(--text2); font-family: monospace; font-size: 11px; margin: 2px 0; }
  .tool-call .result { color: var(--green); font-size: 11px; white-space: pre-wrap; max-height: 60px; overflow-y: auto; }
  #chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--accent2); color: #fff; border-bottom-right-radius: 4px; }
  .msg.naledi { align-self: flex-start; background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg .tool-badge { display: inline-block; font-size: 10px; background: var(--accent); color: #fff; padding: 2px 6px; border-radius: 4px; margin-right: 6px; vertical-align: middle; }
  .msg .time { font-size: 10px; color: var(--text2); margin-top: 4px; text-align: right; }
  #controls { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; background: var(--surface); }
  #input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 24px; padding: 10px 16px; color: var(--text); font-size: 14px; outline: none; transition: border-color .15s; }
  #input:focus { border-color: var(--accent); }
  #send { background: var(--accent); color: #fff; border: none; border-radius: 24px; padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  #send:disabled { opacity: .4; cursor: not-allowed; }
  #send:hover:not(:disabled) { opacity: .85; }
  .toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); cursor: pointer; user-select: none; }
  .toggle input { accent-color: var(--accent); }
  .status { font-size: 11px; color: var(--text2); padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .status .online { color: var(--green); }
  .status .offline { color: var(--red); }
  .typing { align-self: flex-start; display: flex; gap: 4px; padding: 12px 16px; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  #audio-indicator { position: fixed; bottom: 80px; right: 16px; background: var(--accent2); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 12px; display: none; animation: pulse 1.5s infinite; z-index: 100; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }
</style>
</head>
<body>
<div id="side">
  <h1>🧿 Naledi <small>GLM-4.7-Flash · tool calling</small></h1>
  <div id="presets">
    <button class="preset" data-msg="Recommend me some karaoke songs to sing tonight">
      🎤 Recommend songs <span class="desc">Naledi searches the 667K library</span>
    </button>
    <button class="preset" data-msg="Find rock songs by Queen I can sing">
      🎸 Queen rock songs <span class="desc">Searches by artist + genre</span>
    </button>
    <button class="preset" data-msg="What R&B songs do you have for a deep voice?">
      🎵 R&B for deep voice <span class="desc">Genre filter + vibe</span>
    </button>
    <button class="preset" data-msg="Find me a soulful ballad to sing at karaoke">
      ❤️ Soulful ballad <span class="desc">Genre + mood search</span>
    </button>
    <button class="preset" data-msg="What are your services and how do I book?">
      📋 Services & booking <span class="desc">General info (no tool)</span>
    </button>
    <button class="preset" data-msg="Hi Naledi, tell me about yourself">
      👋 Introduction <span class="desc">Simple greeting</span>
    </button>
  </div>
  <div id="tools" class="hidden">
    <h2>🔧 Tool calls</h2>
  </div>
</div>

<div id="main">
  <div class="status">
    <span><span class="online">●</span> Naledi online</span>
    <span>Model: <span style="color:var(--accent)">zai-org/glm-4.7-flash</span></span>
  </div>
  <div id="chat">
    <div class="msg naledi">
      Hi! I'm Naledi, AI assistant for Orion Ventures. Ask me about songs, services, or booking. I can search the full karaoke library — try one of the suggestions on the left!
      <div class="time">just now</div>
    </div>
  </div>
  <div id="controls">
    <label class="toggle" title="Naledi speaks responses via TTS">
      <input type="checkbox" id="ttsToggle"> 🔊 TTS
    </label>
    <label class="toggle" title="Show tool calls in sidebar">
      <input type="checkbox" id="toolsToggle" checked> 🔧 Tools
    </label>
    <input id="input" type="text" placeholder="Ask Naledi about songs, bookings, or services..." autofocus>
    <button id="send">Send</button>
  </div>
</div>
<div id="audio-indicator">🔊 Naledi speaking...</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const ttsToggle = document.getElementById('ttsToggle');
const toolsToggle = document.getElementById('toolsToggle');
const toolsPanel = document.getElementById('tools');

let msgHistory = [];

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function addMessage(role, content, toolCalls) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (toolCalls?.length) {
    const badge = document.createElement('span');
    badge.className = 'tool-badge';
    badge.textContent = `🔧 ${toolCalls.length}`;
    div.appendChild(badge);
  }

  const text = document.createElement('span');
  text.textContent = content;
  div.appendChild(text);

  const time = document.createElement('div');
  time.className = 'time';
  time.textContent = new Date().toLocaleTimeString();
  div.appendChild(time);

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addToolCalls(calls) {
  if (!calls?.length) return;
  toolsPanel.classList.remove('hidden');
  for (const c of calls) {
    const div = document.createElement('div');
    div.className = 'tool-call';
    div.innerHTML = `
      <div class="name">→ ${escapeHtml(c.name)}</div>
      <div class="args">${escapeHtml(JSON.stringify(c.args))}</div>
      <div class="result">${escapeHtml(JSON.stringify(c.result, null, 2))}</div>
    `;
    toolsPanel.appendChild(div);
    toolsPanel.scrollTop = toolsPanel.scrollHeight;
  }
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function showAudioIndicator() {
  const el = document.getElementById('audio-indicator');
  el.style.display = 'block';
}

function hideAudioIndicator() {
  const el = document.getElementById('audio-indicator');
  el.style.display = 'none';
}

function playAudio(base64) {
  try {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: 'audio/mpeg' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    showAudioIndicator();
    audio.onended = () => { hideAudioIndicator(); URL.revokeObjectURL(url); };
    audio.play();
  } catch (e) {
    hideAudioIndicator();
    console.error('TTS playback error:', e);
  }
}

async function sendMessage(msg) {
  if (!msg || !msg.trim()) return;
  input.value = '';
  sendBtn.disabled = true;

  addMessage('user', msg);
  msgHistory.push({ role: 'user', content: msg });
  showTyping();

  try {
    const res = await fetch('/naledi/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: msg,
        messages: msgHistory.slice(-20),
        tts: ttsToggle.checked
      })
    });

    const data = await res.json();
    hideTyping();
    addMessage('naledi', data.reply, data.toolCalls);
    msgHistory.push({ role: 'assistant', content: data.reply });

    if (data.toolCalls?.length) {
      addToolCalls(data.toolCalls);
    }

    if (ttsToggle.checked && data.audio) {
      playAudio(data.audio);
    }
  } catch (e) {
    hideTyping();
    addMessage('naledi', 'Connection error. Is Naledi awake?');
  }

  sendBtn.disabled = false;
  input.focus();
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage(input.value);
});
sendBtn.addEventListener('click', () => sendMessage(input.value));

document.querySelectorAll('.preset').forEach(btn => {
  btn.addEventListener('click', () => sendMessage(btn.dataset.msg));
});

toolsToggle.addEventListener('change', () => {
  toolsPanel.classList.toggle('hidden', !toolsToggle.checked);
});

input.focus();
</script>
</body>
</html>
