<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SupaSing — Profile</title>
  <meta name="theme-color" content="#050505">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SupaSing">
  <meta name="description" content="Your SupaSing profile - stats, milestones, and style.">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="SS-LOGO.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700&family=Noto+Serif+Display:ital,wght@0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="top-bar">
    <a href="/" class="top-back" aria-label="Home">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <img src="SS-LOGO.svg" alt="SupaSing" class="logo-glow" width="28" height="28">
    <button class="sign-out-btn" id="signOutBtn" aria-label="Sign out">Sign Out</button>
  </header>

  <main>
    <section class="profile-header" id="profileHeader">
      <div class="avatar-wrap" id="avatarWrap">
        <div class="avatar-icon" id="avatarIcon"></div>
      </div>
      <h1 class="profile-name" id="profileName">—</h1>
      <p class="profile-stage" id="profileStage"></p>
    </section>

    <section class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <span class="stat-value" id="statPoints">0</span>
        <span class="stat-label">Points</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="statTokens">0</span>
        <span class="stat-label">Tokens</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="statRequests">0</span>
        <span class="stat-label">Songs</span>
      </div>
    </section>

    <section class="section-block" id="milestonesSection">
      <h2 class="section-title">Milestones</h2>
      <div class="milestones" id="milestones"></div>
    </section>

    <section class="section-block" id="moodSection">
      <h2 class="section-title">Your Mood Icon</h2>
      <p class="section-sub">Pick an icon and colour that represents your vibe.</p>
      <div class="mood-picker" id="moodPicker"></div>
    </section>

    <section class="section-block" id="historySection">
      <h2 class="section-title">Recent Requests</h2>
      <div class="history-list" id="historyList">
        <p class="empty-text">No songs yet. Head to Zen Search and hit Supa-Sing!</p>
      </div>
    </section>

    <section class="section-block" id="editSection">
      <h2 class="section-title">Edit Profile</h2>
      <form id="editForm">
        <div class="field">
          <label for="editName">Display Name</label>
          <input type="text" id="editName" placeholder="Your name" autocomplete="off">
        </div>
        <div class="field">
          <label for="editWhatsApp">WhatsApp</label>
          <input type="tel" id="editWhatsApp" placeholder="+27 72 123 4567" autocomplete="tel">
        </div>
        <button type="submit" class="btn" id="saveBtn">Save Changes</button>
      </form>
    </section>

    <footer class="page-footer">
      <div class="footer-links">
        <a href="/" class="footer-link">Home</a>
        <span class="footer-dot"></span>
        <a href="/fav/" class="footer-link">Favourites</a>
      </div>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
